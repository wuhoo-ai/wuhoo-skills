# 全局配置
settings:
  rsshub_base: "http://127.0.0.1:1200"
  fetch_interval_minutes: 60
  max_items_per_feed: 50
  db_path: "data/news.db"
  user_agent: "wuhoo-news-rss/1.0"
  timeout_seconds: 30
  retry_count: 3

# 告警关键词（命中后自动标记文章并提升热度评分）
alert_keywords:
